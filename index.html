<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>AI 作品集 · 林木阳</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: radial-gradient(ellipse at bottom, #1b2735 0%, #090a0f 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Segoe UI', 'Roboto', 'PingFang SC', 'Microsoft YaHei', 'Helvetica Neue', sans-serif;
      padding: 2rem 1rem;
      margin: 0;
      position: relative;
      overflow-x: hidden;
    }

    canvas#starsCanvas {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 0;
      pointer-events: none;
    }

    .card {
      position: relative;
      z-index: 2;
      max-width: 700px;
      width: 100%;
      background: rgba(255, 255, 255, 0.07);
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
      border-radius: 2.5rem;
      padding: 2.8rem 2.2rem;
      box-shadow: 0 30px 50px rgba(0, 0, 0, 0.6), 0 0 0 1px rgba(255, 255, 255, 0.08);
      color: #f0f0f0;
      transition: all 0.2s ease;
    }

    h1 {
      font-size: 2.8rem;
      font-weight: 600;
      letter-spacing: 2px;
      margin-bottom: 0.3rem;
      background: linear-gradient(135deg, #ffffff 0%, #a5d8ff 80%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .subtitle {
      font-size: 1rem;
      color: #b0d4f0;
      margin-bottom: 2rem;
      border-left: 4px solid #4dabf7;
      padding-left: 1.2rem;
      font-weight: 300;
      display: flex;
      align-items: center;
      gap: 0.4rem;
    }

    .typewriter {
      font-size: 1.3rem;
      font-weight: 400;
      margin: 1.8rem 0 2rem;
      min-height: 2.8rem;
      color: #e0f0ff;
      background: rgba(10, 20, 30, 0.5);
      padding: 0.7rem 1.4rem;
      border-radius: 40px;
      display: inline-block;
      border: 1px solid rgba(255, 255, 255, 0.15);
    }

    .cursor {
      display: inline-block;
      width: 2px;
      height: 1.4rem;
      background: #ffffff;
      margin-left: 5px;
      vertical-align: middle;
      animation: blink 0.9s infinite;
    }

    @keyframes blink {
      0%, 100% { opacity: 1; }
      50% { opacity: 0; }
    }

    .section-title {
      font-size: 1.5rem;
      font-weight: 500;
      margin: 2.2rem 0 1.4rem;
      display: flex;
      align-items: center;
      gap: 0.5rem;
      color: #cdedff;
      border-bottom: 1px dashed rgba(255, 255, 255, 0.25);
      padding-bottom: 0.6rem;
    }

    .project-grid {
      display: flex;
      flex-direction: column;
      gap: 1.2rem;
    }

    .project-card {
      background: rgba(255, 255, 255, 0.05);
      border-radius: 1.5rem;
      padding: 1.2rem 1.5rem;
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      border: 1px solid rgba(255, 255, 255, 0.1);
      transition: transform 0.2s, background 0.3s;
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      justify-content: space-between;
    }

    .project-card:hover {
      background: rgba(255, 255, 255, 0.1);
      transform: translateY(-3px);
      border-color: rgba(255, 255, 255, 0.25);
    }

    .project-info h3 {
      font-size: 1.3rem;
      font-weight: 500;
      margin-bottom: 0.2rem;
      color: white;
    }

    .project-info p {
      font-size: 0.9rem;
      color: #c2dff5;
    }

    .tag {
      background: #1e3b4f;
      color: #c8e7ff;
      padding: 0.3rem 1rem;
      border-radius: 30px;
      font-size: 0.8rem;
      font-weight: 500;
      letter-spacing: 0.4px;
      white-space: nowrap;
    }

    .footer-links {
      display: flex;
      flex-wrap: wrap;
      gap: 1.4rem;
      margin-top: 2.5rem;
      justify-content: center;
      font-size: 0.95rem;
    }

    .footer-links a {
      color: #b6dcff;
      text-decoration: none;
      border-bottom: 1px dotted rgba(255, 255, 255, 0.4);
      transition: color 0.2s;
    }

    .footer-links a:hover {
      color: white;
      border-bottom: 1px solid white;
    }

    @media (max-width: 550px) {
      .card {
        padding: 1.8rem 1.2rem;
      }
      h1 {
        font-size: 2.2rem;
      }
    }
  </style>
</head>
<body>
  <canvas id="starsCanvas"></canvas>

  <main class="card">
    <h1>林木阳</h1>
    <div class="subtitle">🎯 AI 产品经理 · 智能交互探索者</div>

    <div class="typewriter">
      <span id="typewriter-text"></span><span class="cursor"></span>
    </div>

    <div class="section-title">
      <span>🚀</span> 精选项目
    </div>

    <div class="project-grid">
      <div class="project-card">
        <div class="project-info">
          <h3>🧠 智能文档问答助手</h3>
          <p>基于RAG的PDF/网页多模态检索 · 语音输入</p>
        </div>
        <span class="tag">LangChain</span>
      </div>
      <div class="project-card">
        <div class="project-info">
          <h3>📊 用户行为洞察仪表盘</h3>
          <p>产品数据自动分析 · 异常检测 · 自动报告</p>
        </div>
        <span class="tag">SQL+LLM</span>
      </div>
      <div class="project-card">
        <div class="project-info">
          <h3>🎨 AI创意营销文案引擎</h3>
          <p>多风格文案生成 · A/B测试集成 · 品牌调性控制</p>
        </div>
        <span class="tag">GPT-4o</span>
      </div>
    </div>

    <div class="footer-links">
      <a href="#">📧 linyang.mu@ai portfolio</a>
      <a href="#">🔗 小红书 · AI产品日常</a>
      <a href="#">💼 即刻加入项目</a>
    </div>
  </main>

  <script>
    (function() {
      // ---------- 星空背景 ----------
      const canvas = document.getElementById('starsCanvas');
      const ctx = canvas.getContext('2d');
      let width, height;
      let stars = [];

      function initStars(count = 200) {
        stars = [];
        for (let i = 0; i < count; i++) {
          stars.push({
            x: Math.random() * width,
            y: Math.random() * height,
            radius: Math.random() * 2.2 + 0.4,
            brightness: Math.random() * 0.7 + 0.3,
            speed: Math.random() * 0.25 + 0.05
          });
        }
      }

      function resizeCanvas() {
        width = window.innerWidth;
        height = window.innerHeight;
        canvas.width = width;
        canvas.height = height;
        initStars(180);
      }

      function drawStars() {
        if (!ctx || !canvas) return;
        ctx.clearRect(0, 0, width, height);
        for (let s of stars) {
          ctx.beginPath();
          ctx.arc(s.x, s.y, s.radius, 0, Math.PI * 2);
          ctx.fillStyle = `rgba(255, 255, 255, ${s.brightness})`;
          ctx.fill();
          s.y += s.speed;
          if (s.y > height + 5) {
            s.y = -5;
            s.x = Math.random() * width;
          }
        }
        requestAnimationFrame(drawStars);
      }

      window.addEventListener('resize', () => {
        resizeCanvas();
      });

      resizeCanvas();
      drawStars();

      // ---------- 打字机效果 ----------
      const textElement = document.getElementById('typewriter-text');
      const phrases = [
        "用AI重新定义产品体验。",
        "让每一个交互都充满智慧。",
        "正在构建下一代智能工具……",
        "数据 + 模型 + 共情 = 好产品。"
      ];
      let phraseIndex = 0;
      let charIndex = 0;
      let isDeleting = false;
      let typeSpeed = 90;

      function typeEffect() {
        const currentPhrase = phrases[phraseIndex];
        
        if (!isDeleting) {
          textElement.textContent = currentPhrase.substring(0, charIndex + 1);
          charIndex++;
          if (charIndex === currentPhrase.length) {
            isDeleting = true;
            typeSpeed = 1400; 
            setTimeout(typeEffect, typeSpeed);
            return;
          }
          typeSpeed = 70 + Math.random() * 40;
        } else {
          textElement.textContent = currentPhrase.substring(0, charIndex - 1);
          charIndex--;
          if (charIndex === 0) {
            isDeleting = false;
            phraseIndex = (phraseIndex + 1) % phrases.length;
            typeSpeed = 300;
          } else {
            typeSpeed = 35;
          }
        }
        setTimeout(typeEffect, typeSpeed);
      }

      if (textElement) {
        typeEffect();
      }
    })();
  </script>
</body>
</html>

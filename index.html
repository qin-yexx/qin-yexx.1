<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <meta name="description" content="林木阳 · AI产品经理 · 智能交互探索者 · 浅蓝科技风作品集">
  <title>林木阳 · 浅蓝科技AI作品集</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      /* 浅科技渐变蓝：从清爽的冰蓝到通透的天蓝色，更明亮柔和 */
      background: linear-gradient(145deg, #cae9ff 0%, #b0dcff 30%, #8bcbff 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Segoe UI', 'Inter', 'Roboto', 'PingFang SC', 'Microsoft YaHei', 'Helvetica Neue', sans-serif;
      padding: 2rem 1rem;
      margin: 0;
      position: relative;
      overflow-x: hidden;
    }

    /* 保留柔和的光晕层增加层次感，但不影响主体 */
    body::before {
      content: "";
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: radial-gradient(ellipse at 30% 40%, rgba(255, 255, 255, 0.4), rgba(150, 210, 255, 0.1) 80%);
      pointer-events: none;
      z-index: 1;
    }

    /* 微细网格纹理，科技感但不抢眼 */
    body::after {
      content: "";
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-image: 
        linear-gradient(rgba(80, 160, 255, 0.08) 1px, transparent 1px),
        linear-gradient(90deg, rgba(80, 160, 255, 0.08) 1px, transparent 1px);
      background-size: 32px 32px;
      pointer-events: none;
      z-index: 1;
    }

    /* 主卡片 —— 半透玻璃质感 + 轻盈蓝调边框 */
    .card {
      position: relative;
      z-index: 10;
      max-width: 780px;
      width: 100%;
      background: rgba(255, 255, 255, 0.65);
      backdrop-filter: blur(18px) saturate(180%);
      -webkit-backdrop-filter: blur(18px) saturate(180%);
      border-radius: 2.8rem;
      padding: 2.8rem 2.5rem;
      box-shadow: 0 20px 38px rgba(0, 30, 60, 0.12), 0 0 0 1px rgba(0, 110, 210, 0.2), 0 8px 20px rgba(0, 70, 140, 0.1);
      transition: box-shadow 0.3s ease, transform 0.2s ease;
      color: #023b66;
    }

    .card:hover {
      box-shadow: 0 24px 44px rgba(0, 50, 90, 0.2), 0 0 0 1px rgba(0, 130, 230, 0.4);
    }

    /* 姓名 —— 深蓝渐变增加科技感 */
    h1 {
      font-size: 3.2rem;
      font-weight: 700;
      letter-spacing: -0.5px;
      margin-bottom: 0.3rem;
      background: linear-gradient(135deg, #0a4770 0%, #1f6eb0 60%, #2c7fd4 100%);
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
      text-shadow: 0 2px 4px rgba(0, 100, 150, 0.1);
    }

    .subtitle {
      font-size: 1.05rem;
      color: #176b9e;
      margin-bottom: 2rem;
      border-left: 4px solid #2f8ed4;
      padding-left: 1.2rem;
      font-weight: 500;
      display: flex;
      align-items: center;
      gap: 0.5rem;
      text-shadow: 0 1px 0 rgba(255,255,255,0.3);
    }

    /* 打字机区域：浅蓝玻璃质感 */
    .typewriter {
      font-size: 1.3rem;
      font-weight: 500;
      margin: 1.8rem 0 2rem;
      min-height: 3.2rem;
      color: #035a8f;
      background: rgba(210, 235, 255, 0.7);
      backdrop-filter: blur(4px);
      padding: 0.75rem 1.6rem;
      border-radius: 60px;
      display: inline-block;
      width: auto;
      border: 1px solid rgba(0, 120, 210, 0.35);
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.02);
      letter-spacing: 0.2px;
    }

    .cursor {
      display: inline-block;
      width: 2px;
      height: 1.45rem;
      background: #1a7fc9;
      margin-left: 6px;
      vertical-align: middle;
      animation: blink 0.9s infinite;
    }

    @keyframes blink {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.3; }
    }

    /* 章节标题 */
    .section-title {
      font-size: 1.65rem;
      font-weight: 600;
      margin: 2.2rem 0 1.4rem;
      display: flex;
      align-items: center;
      gap: 0.6rem;
      color: #115d8c;
      border-bottom: 2px solid rgba(30, 130, 210, 0.5);
      padding-bottom: 0.6rem;
    }

    .section-title span {
      filter: drop-shadow(0 1px 1px rgba(0,0,0,0.05));
    }

    /* 项目卡片 - 浅蓝科技感升级 */
    .project-grid {
      display: flex;
      flex-direction: column;
      gap: 1.2rem;
    }

    .project-card {
      background: rgba(255, 255, 255, 0.75);
      backdrop-filter: blur(8px);
      border-radius: 1.8rem;
      padding: 1.2rem 1.7rem;
      border: 1px solid rgba(0, 110, 200, 0.25);
      transition: all 0.25s ease;
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      justify-content: space-between;
      box-shadow: 0 6px 14px rgba(0, 20, 40, 0.05);
    }

    .project-card:hover {
      background: rgba(255, 255, 255, 0.9);
      transform: translateY(-3px);
      border-color: #3c9eff;
      box-shadow: 0 12px 24px rgba(0, 90, 150, 0.12);
    }

    .project-info h3 {
      font-size: 1.32rem;
      font-weight: 650;
      margin-bottom: 0.3rem;
      color: #014175;
    }

    .project-info p {
      font-size: 0.88rem;
      color: #2f6f9b;
      font-weight: 450;
    }

    /* 标签风格：清爽科技蓝 */
    .tag {
      background: linear-gradient(115deg, #e8f4ff, #d2e9ff);
      color: #0165a7;
      padding: 0.3rem 1rem;
      border-radius: 40px;
      font-size: 0.78rem;
      font-weight: 600;
      letter-spacing: 0.3px;
      white-space: nowrap;
      border: 1px solid rgba(0, 128, 210, 0.3);
      box-shadow: 0 1px 2px rgba(0,0,0,0.02);
    }

    /* 底部链接区 */
    .footer-links {
      display: flex;
      flex-wrap: wrap;
      gap: 1.8rem;
      margin-top: 2.8rem;
      justify-content: center;
      font-size: 0.92rem;
      font-weight: 500;
    }

    .footer-links a {
      color: #016bb3;
      text-decoration: none;
      border-bottom: 1px solid rgba(0, 110, 200, 0.4);
      transition: all 0.2s;
      padding: 0.2rem 0;
      display: inline-flex;
      align-items: center;
      gap: 6px;
    }

    .footer-links a:hover {
      color: #003d66;
      border-bottom-color: #0174c7;
      transform: translateY(-1px);
    }

    /* 响应式适配 */
    @media (max-width: 600px) {
      .card {
        padding: 1.8rem 1.4rem;
        border-radius: 2rem;
      }
      h1 {
        font-size: 2.4rem;
      }
      .typewriter {
        font-size: 1rem;
        padding: 0.6rem 1.2rem;
      }
      .section-title {
        font-size: 1.4rem;
      }
      .project-card {
        padding: 1rem 1.2rem;
        flex-direction: column;
        align-items: flex-start;
        gap: 10px;
      }
      .tag {
        align-self: flex-start;
      }
      .footer-links {
        gap: 1rem;
      }
    }

    /* 简洁滚动条 */
    ::-webkit-scrollbar {
      width: 6px;
      background: #cce4f5;
    }
    ::-webkit-scrollbar-thumb {
      background: #6dafdf;
      border-radius: 8px;
    }

    a {
      -webkit-tap-highlight-color: transparent;
    }
  </style>
</head>
<body>
  <main class="card">
    <h1>林木阳</h1>
    <div class="subtitle">
      <span>⚡</span> AI 产品经理 · 智能交互探索者 <span style="font-size: 0.9rem;">| 浅蓝科技风</span>
    </div>

    <div class="typewriter">
      <span id="typewriter-text"></span><span class="cursor"></span>
    </div>

    <div class="section-title">
      <span>🚀</span> 前沿项目
    </div>

    <div class="project-grid">
      <div class="project-card">
        <div class="project-info">
          <h3>🧠 智能文档问答助手</h3>
          <p>基于RAG的PDF/网页多模态检索 · 语音输入 · 高精度语义理解</p>
        </div>
        <span class="tag">LangChain · 知识增强</span>
      </div>
      <div class="project-card">
        <div class="project-info">
          <h3>📊 用户行为洞察仪表盘</h3>
          <p>产品数据自动分析 · 异常检测 · AI自动报告生成 & 归因</p>
        </div>
        <span class="tag">SQL+LLM · 可视化</span>
      </div>
      <div class="project-card">
        <div class="project-info">
          <h3>🎨 AI创意营销文案引擎</h3>
          <p>多风格文案生成 · A/B测试集成 · 品牌调性微控</p>
        </div>
        <span class="tag">GPT-4o · 多模态对齐</span>
      </div>
    </div>

    <div class="footer-links">
      <a href="resume.html">📄 我的简历 · 智能产品思维</a>
      <a href="#" id="emailMock">📧 mu.linyang@aiforge.ai</a>
      <a href="#">🔗 小红书 · AI产品日常</a>
      <a href="#">💡 即刻加入项目协作</a>
    </div>
  </main>

  <script>
    (function() {
      // ---------- 纯打字机效果 (无任何粒子/星空相关代码) ----------
      const textElement = document.getElementById('typewriter-text');
      const phrases = [
        "用AI重新定义产品体验 ✨",
        "让每一个交互都充满智慧 🔮",
        "构建下一代智能工具 · 人机共生",
        "数据 + 模型 + 共情 = 好产品 ⚡",
        "深度探索 AI 产品边界 🧬"
      ];
      let phraseIndex = 0;
      let charIndex = 0;
      let isDeleting = false;
      let typeSpeed = 85;

      function typeEffect() {
        const currentPhrase = phrases[phraseIndex];
        
        if (!isDeleting) {
          textElement.textContent = currentPhrase.substring(0, charIndex + 1);
          charIndex++;
          if (charIndex === currentPhrase.length) {
            isDeleting = true;
            typeSpeed = 1500;   // 停留时间
            setTimeout(typeEffect, typeSpeed);
            return;
          }
          typeSpeed = 55 + Math.random() * 40;
        } else {
          textElement.textContent = currentPhrase.substring(0, charIndex - 1);
          charIndex--;
          if (charIndex === 0) {
            isDeleting = false;
            phraseIndex = (phraseIndex + 1) % phrases.length;
            typeSpeed = 320;
          } else {
            typeSpeed = 35;
          }
        }
        setTimeout(typeEffect, typeSpeed);
      }

      if (textElement) {
        typeEffect();
      }
      
      // 邮箱交互（复制邮件地址小功能，不涉及粒子）
      const emailLink = document.getElementById('emailMock');
      if (emailLink) {
        emailLink.addEventListener('click', (e) => {
          e.preventDefault();
          const fakeEmail = "mu.linyang@aiforge.ai";
          navigator.clipboard.writeText(fakeEmail).then(() => {
            const tipSpan = document.createElement('div');
            tipSpan.innerText = '📋 邮箱已复制 · 期待联系';
            tipSpan.style.position = 'fixed';
            tipSpan.style.bottom = '24px';
            tipSpan.style.left = '50%';
            tipSpan.style.transform = 'translateX(-50%)';
            tipSpan.style.backgroundColor = 'rgba(255, 255, 255, 0.85)';
            tipSpan.style.backdropFilter = 'blur(12px)';
            tipSpan.style.color = '#016bb3';
            tipSpan.style.padding = '8px 20px';
            tipSpan.style.borderRadius = '40px';
            tipSpan.style.fontSize = '0.85rem';
            tipSpan.style.border = '1px solid #48a9e5';
            tipSpan.style.fontWeight = '500';
            tipSpan.style.zIndex = '999';
            tipSpan.style.pointerEvents = 'none';
            tipSpan.style.boxShadow = '0 4px 12px rgba(0,0,0,0.05)';
            document.body.appendChild(tipSpan);
            setTimeout(() => { tipSpan.remove(); }, 2000);
          }).catch(() => {
            alert('邮箱: mu.linyang@aiforge.ai');
          });
        });
      }

      // 可选增加细微光标跟随效果（卡片边缘灵动感）
      const card = document.querySelector('.card');
      if (card) {
        card.addEventListener('mousemove', (e) => {
          const rect = card.getBoundingClientRect();
          const x = e.clientX - rect.left;
          const y = e.clientY - rect.top;
          const xPercent = (x / rect.width) * 100;
          const yPercent = (y / rect.height) * 100;
          card.style.setProperty('--x-glow', `${xPercent}%`);
          card.style.setProperty('--y-glow', `${yPercent}%`);
        });
        // 添加极简动态光影增强科技感，但不使用任何粒子元素
        const dynamicStyle = document.createElement('style');
        dynamicStyle.textContent = `
          .card {
            --x-glow: 50%;
            --y-glow: 50%;
            background: radial-gradient(circle at var(--x-glow) var(--y-glow), rgba(255, 255, 255, 0.85), rgba(235, 248, 255, 0.65));
            transition: background 0.15s;
          }
          .card:hover {
            background: radial-gradient(circle at var(--x-glow) var(--y-glow), rgba(255, 255, 255, 0.92), rgba(225, 243, 255, 0.72));
          }
        `;
        document.head.appendChild(dynamicStyle);
      }
    })();
  </script>
</body>
</html>
